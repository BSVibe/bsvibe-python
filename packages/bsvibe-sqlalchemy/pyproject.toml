[project]
name = "bsvibe-sqlalchemy"
version = "0.1.0"
description = "BSVibe shared SQLAlchemy library — async engine factory, session helpers, Alembic baseline tooling"
requires-python = ">=3.11"
dependencies = [
    "bsvibe-core",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "asyncpg>=0.29",
    "aiosqlite>=0.20",
    "pydantic>=2",
    "pydantic-settings>=2.5",
]

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.110",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_sqlalchemy"]
