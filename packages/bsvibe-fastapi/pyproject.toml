[project]
name = "bsvibe-fastapi"
version = "0.1.0"
description = "BSVibe shared FastAPI library — CORS, health router, request id middleware"
requires-python = ">=3.11"
dependencies = [
    "bsvibe-core",
    "fastapi>=0.110",
    "pydantic>=2",
    "pydantic-settings>=2.5",
    "structlog>=24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_fastapi"]
