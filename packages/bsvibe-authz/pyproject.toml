[project]
name = "bsvibe-authz"
version = "0.0.1"
description = "BSVibe shared authorization library"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
    "httpx>=0.27",
    "fastapi>=0.110",
    "structlog>=24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_authz"]
