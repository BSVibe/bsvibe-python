[project]
name = "bsvibe-authz"
version = "0.8.0"
description = "BSVibe shared authorization library — JWT verification, OpenFGA client, FastAPI deps"
requires-python = ">=3.11"
dependencies = [
    "bsvibe-core",
    "pydantic>=2",
    "pydantic-settings>=2.0.0",
    "httpx>=0.27",
    "fastapi>=0.110",
    "structlog>=24",
    "pyjwt[crypto]>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_authz"]

[tool.hatch.build.targets.wheel.force-include]
"schema/bsvibe.fga" = "bsvibe_authz/schema/bsvibe.fga"
