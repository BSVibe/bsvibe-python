[project]
name = "bsvibe-alerts"
version = "0.1.0"
description = "BSVibe shared alert publishing — multi-channel routing (telegram/slack/structlog)"
requires-python = ">=3.11"
dependencies = [
    "bsvibe-core",
    "httpx>=0.27",
    "pydantic>=2",
    "pydantic-settings>=2.5",
    "structlog>=24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_alerts"]
