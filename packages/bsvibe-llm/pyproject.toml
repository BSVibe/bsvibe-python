[project]
name = "bsvibe-llm"
version = "0.2.0"
description = "BSVibe shared LLM library — LiteLLM adapter routed through BSGateway with run-audit metadata, retry, and fallback"
requires-python = ">=3.11"
dependencies = [
    "bsvibe-core",
    "litellm>=1.50",
    "httpx>=0.27",
    "pydantic>=2",
    "pydantic-settings>=2.5",
    "structlog>=24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_llm"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.12",
]
