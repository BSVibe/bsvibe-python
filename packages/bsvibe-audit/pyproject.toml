[project]
name = "bsvibe-audit"
version = "0.1.0"
description = "BSVibe shared audit library — outbox-pattern emitter, Pydantic event schemas, async relay, HTTP client to BSVibe-Auth audit endpoint"
requires-python = ">=3.11"
dependencies = [
    "bsvibe-core",
    "bsvibe-alerts",
    "httpx>=0.27",
    "typer>=0.12",
    "pydantic>=2",
    "pydantic-settings>=2.5",
    "sqlalchemy[asyncio]>=2.0",
    "structlog>=24",
]

[project.scripts]
bsvibe-audit = "bsvibe_audit.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_audit"]
