[project]
name = "bsvibe-mcp"
version = "0.1.0"
description = "BSVibe MCP server — exposes the four product CLIs (bsgateway/bsage/bsnexus/bsupervisor) as MCP tools"
requires-python = ">=3.11"
dependencies = [
    "bsvibe-cli-base",
    "bsvibe-core",
    "mcp>=1.0",
    "pydantic>=2",
    "structlog>=24",
    "typer>=0.12",
]

[project.scripts]
bsvibe-mcp = "bsvibe_mcp.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_mcp"]
