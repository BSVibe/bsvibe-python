[project]
name = "bsvibe-demo"
version = "0.1.0"
description = "BSVibe shared interactive-demo helpers — ephemeral tenants, demo JWT issuer, LLM mock guard, tenant GC"
requires-python = ">=3.11"
dependencies = [
    "asyncpg>=0.29",
    "pyjwt>=2.8",
    "structlog>=24",
]

[project.optional-dependencies]
sqlalchemy = ["sqlalchemy>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bsvibe_demo"]
