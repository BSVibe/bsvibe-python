name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - bsvibe-authz
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Ruff check
        run: uv run ruff check .

      - name: Run tests
        working-directory: packages/${{ matrix.package }}
        run: uv run --package ${{ matrix.package }} pytest tests/
